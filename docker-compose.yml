version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sports-db
    environment:
      POSTGRES_USER: ${DB_USER:-sports}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sports123}
      POSTGRES_DB: ${DB_NAME:-sports_live}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-sports}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sports-network

  redis:
    image: redis:7-alpine
    container_name: sports-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sports-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sports-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-sports}:${DB_PASSWORD:-sports123}@postgres:5432/${DB_NAME:-sports_live}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    networks:
      - sports-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sports-frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001}
      REACT_APP_WS_URL: ${REACT_APP_WS_URL:-ws://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sports-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  sports-network:
    driver: bridge
